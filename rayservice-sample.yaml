apiVersion: ray.io/v1
kind: RayService
metadata:
  name: rayservice-sample
spec:

  serveConfigV2: |
    applications:
      - name: fruit_app
        route_prefix: /

        import_path: ray.serve.tests.test_config_files.fruit.deployment_graph

        runtime_env: {}

        deployments:
          - name: MangoStand
            num_replicas: 2

  rayClusterConfig:

    rayVersion: "2.47.1"

    headGroupSpec:

      serviceType: ClusterIP

      rayStartParams:
        dashboard-host: "0.0.0.0"

      template:
        spec:
          containers:
            - name: ray-head
              image: rayproject/ray:2.47.1
              ports:
                - containerPort: 6379
                  name: gcs
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client

    workerGroupSpecs:
      - groupName: worker-group
        replicas: 2
        minReplicas: 1
        maxReplicas: 3

        template:
          spec:
            containers:
              - name: ray-worker
                image: rayproject/ray:2.47.1
