apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: raycluster-test
spec:
  rayVersion: '2.47.1'

  headGroupSpec:
    serviceType: ClusterIP

    rayStartParams:
      dashboard-host: '0.0.0.0'

    template:
      spec:
        containers:
          - name: ray-head
            image: rayproject/ray:2.47.1
            ports:
              - containerPort: 6379
                name: gcs
              - containerPort: 8265
                name: dashboard
              - containerPort: 10001
                name: client

  workerGroupSpecs:
    - groupName: worker-group

      replicas: 2
      minReplicas: 2
      maxReplicas: 2

      rayStartParams: {}

      template:
        spec:
          containers:
            - name: ray-worker
              image: rayproject/ray:2.47.1
